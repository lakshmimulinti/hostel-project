<div class="login-wrapper" [ngStyle]="{'background': loginBgGradient}">

  <div class="login-header">
    <div class="logo-box"><i class="fas fa-building"></i></div>
    <h2>HostelHub</h2>
    <p>Welcome to your new home away from home.</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="tab-btn" [class.active]="activeTab==='login'" (click)="setActiveTab('login')">Login</button>
      <button class="tab-btn" [class.active]="activeTab==='signup'" (click)="setActiveTab('signup')">Sign Up</button>
    </div>

    <!-- Toggle Auth Mode Link -->
    <div class="mode-toggle-link">
      <a (click)="toggleAuthMode()">
        {{ usePasswordMode ? 'Login/Sign Up using Email OTP' : 'Login/Sign Up using Password' }}
      </a>
    </div>

    <!-- LOGIN FORM -->
    <form *ngIf="activeTab==='login'" [formGroup]="loginForm" (ngSubmit)="usePasswordMode ? submitPasswordAuth('login') : null">
      <div class="form-group" *ngIf="!isOtpSent">
        <label>Email Address</label>
        <div class="input-box">
          <i class="fas fa-envelope"></i>
          <input type="email" formControlName="email" placeholder="Enter your Email">
        </div>
        <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Please enter a valid email address.
        </small>
      </div>

      <!-- Password Input Box -->
      <div class="form-group" *ngIf="usePasswordMode">
        <label>Password</label>
        <div class="input-box">
          <i class="fas fa-lock"></i>
          <input type="password" formControlName="password" placeholder="Enter your password">
        </div>
        <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required (min 4 characters).
        </small>
      </div>

      <!-- OTP Input Box -->
      <div class="form-group" *ngIf="!usePasswordMode && isOtpSent">
        <label>Enter 6-Digit OTP</label>
        <div class="input-box">
          <i class="fas fa-key"></i>
          <input type="text" formControlName="otp" placeholder="••••••" maxLength="6">
        </div>
        <small class="error" *ngIf="loginForm.get('otp')?.touched && loginForm.get('otp')?.invalid">
          OTP is required.
        </small>
      </div>

      <!-- Submit Actions -->
      <button class="login-btn" type="submit" *ngIf="usePasswordMode">
        Verify & Login <i class="fas fa-sign-in-alt"></i>
      </button>

      <button class="login-btn" type="button" *ngIf="!usePasswordMode && !isOtpSent" (click)="requestOtp('login')">
        Get OTP <i class="fas fa-arrow-right"></i>
      </button>

      <button class="login-btn" type="button" *ngIf="!usePasswordMode && isOtpSent" (click)="verifyAndSubmit('login')">
        Verify & Login
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form *ngIf="activeTab==='signup'" [formGroup]="signupForm" (ngSubmit)="usePasswordMode ? submitPasswordAuth('signup') : null">
      <div *ngIf="!isOtpSent">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" formControlName="fullName" placeholder="Enter Full Name">
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" formControlName="email" placeholder="Enter your Email">
          </div>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input type="text" formControlName="mobileNo" placeholder="Enter Mobile No">
          </div>
        </div>

        <!-- Password Input Box -->
        <div class="form-group" *ngIf="usePasswordMode">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" formControlName="password" placeholder="Create a password">
          </div>
        </div>
      </div>

      <!-- OTP Input Box -->
      <div class="form-group" *ngIf="!usePasswordMode && isOtpSent">
        <label>Enter 6-Digit OTP</label>
        <div class="input-box">
          <i class="fas fa-key"></i>
          <input type="text" formControlName="otp" placeholder="••••••" maxLength="6">
        </div>
      </div>

      <!-- Submit Actions -->
      <button class="login-btn" type="submit" *ngIf="usePasswordMode">
        Sign Up & Create Account <i class="fas fa-user-plus"></i>
      </button>

      <button class="login-btn" type="button" *ngIf="!usePasswordMode && !isOtpSent" (click)="requestOtp('signup')">
        Register & Get OTP
      </button>

      <button class="login-btn" type="button" *ngIf="!usePasswordMode && isOtpSent" (click)="verifyAndSubmit('signup')">
        Verify & Create Account
      </button>
    </form>

    <div class="divider"><span>SOCIAL ACCESS</span></div>
    <div class="social-buttons">
      <button class="social-btn"><i class="fab fa-google"></i> Google</button>
      <button class="social-btn"><i class="far fa-user"></i> University ID</button>
    </div>
  </div>
</div>
